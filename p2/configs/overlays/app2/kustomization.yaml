apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - target: { kind: Deployment, name: __APP_NAME__ }
    patch: |-
      - op: replace
        path: /metadata/name
        value: app2
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/selector/matchLabels/app
        value: app2
      - op: replace
        path: /spec/template/metadata/labels/app
        value: app2
  - target: { kind: Service, name: __APP_NAME__ }
    patch: |-
      - op: replace
        path: /metadata/name
        value: app2
      - op: replace
        path: /spec/selector/app
        value: app2
