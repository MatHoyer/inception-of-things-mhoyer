<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>__APP_NAME__</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0b0f;
        --surface: #12141c;
        --border: #2a2d3a;
        --muted: #6b7280;
        --accent: #22d3ee;
        --accent-dim: rgba(34, 211, 238, 0.15);
        --glow: 0 0 40px rgba(34, 211, 238, 0.2);
        --text: #e2e8f0;
        --text-soft: #94a3b8;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Outfit", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        overflow-x: hidden;
      }

      /* subtle grid bg */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(34, 211, 238, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(34, 211, 238, 0.03) 1px, transparent 1px);
        background-size: 48px 48px;
        pointer-events: none;
        z-index: 0;
      }

      .card {
        position: relative;
        z-index: 1;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 2.5rem 3rem;
        max-width: 520px;
        width: 100%;
        box-shadow: var(--glow);
        animation: cardIn 0.6s ease-out;
      }

      @keyframes cardIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .badge {
        display: inline-block;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: var(--accent);
        background: var(--accent-dim);
        padding: 0.35rem 0.75rem;
        border-radius: 6px;
        margin-bottom: 1.25rem;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        50% {
          opacity: 0.8;
        }
      }

      h1 {
        font-size: clamp(1.75rem, 5vw, 2.25rem);
        font-weight: 800;
        letter-spacing: -0.02em;
        color: var(--text);
        margin-bottom: 1.5rem;
        line-height: 1.2;
      }

      .meta {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .meta-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-size: 0.9rem;
        color: var(--text-soft);
      }

      .meta-row kbd {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.8rem;
        color: var(--muted);
        min-width: 4.5rem;
      }

      .meta-row span {
        font-family: "JetBrains Mono", monospace;
        color: var(--accent);
        word-break: break-all;
      }

      .divider {
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--border), transparent);
        margin: 1rem 0;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 1.25rem;
        font-size: 0.8rem;
        color: var(--muted);
      }

      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #22c55e;
        box-shadow: 0 0 8px #22c55e;
        animation: blink 1.5s ease-in-out infinite;
      }

      @keyframes blink {
        50% {
          opacity: 0.5;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">Running</div>
      <h1>__APP_NAME__</h1>
      <div class="meta">
        <div class="meta-row">
          <kbd>kernel</kbd>
          <span>__KERNEL__</span>
        </div>
        <div class="divider"></div>
        <div class="meta-row">
          <kbd>pod</kbd>
          <span>__POD_NAME__</span>
        </div>
      </div>
      <div class="status">
        <span class="status-dot"></span>
        Pod ready
      </div>
    </div>
  </body>
</html>
